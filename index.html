<!DOCTYPE html>

<head>

        /* =========================================
           PREMIUM DARK THEME & TRICKS
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0b0d; color: #fff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ff2a5f; border-radius: 10px; }
        
        /* HEADER */
        header { background: #131316; padding: 18px 20px; text-align: center; border-bottom: 2px solid #ff2a5f; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(255, 42, 95, 0.15); }
        header h1 { font-size: 22px; color: #ff2a5f; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        header span { font-size: 11px; color: #8a8a93; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; display: block; }

        /* MAIN GRID */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
        
        .profile-card { background: #131316; border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.3s; position: relative; border: 1px solid #222227; }
        .profile-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(255, 42, 95, 0.3); border-color: #ff2a5f; }
        .card-img-wrapper { width: 100%; height: 230px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .profile-card:hover .card-img { transform: scale(1.05); }
        
        .online-dot { position: absolute; top: 12px; left: 12px; background: #2ecc71; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 12px #2ecc71; animation: pulse 1.5s infinite; z-index: 5; }
        .live-badge-small { position: absolute; top: 12px; right: 12px; background: #ff2a5f; color: white; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 20px; animation: blink 1s infinite; z-index: 5; letter-spacing: 0.5px; box-shadow: 0 0 10px rgba(255, 42, 95, 0.5); }
        .distance-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 3px 6px; border-radius: 5px; backdrop-filter: blur(3px); z-index: 5; border: 1px solid #333; }
        
        .card-info { padding: 12px; background: #131316; text-align: center; }
        .card-name { font-size: 16px; font-weight: 700; color: #ffffff; }
        .card-location { font-size: 12px; color: #a1a1aa; margin-top: 4px; }

        /* MODAL SYSTEM */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 6, 0.96); z-index: 1000; overflow-y: auto; backdrop-filter: blur(8px); }
        .modal-content { background: #0f0f12; max-width: 550px; margin: 0 auto; min-height: 100vh; position: relative; border-left: 1px solid #222227; border-right: 1px solid #222227; padding-bottom: 40px; }
        
        .close-btn { position: fixed; top: 15px; right: 20px; background: rgba(255, 255, 255, 0.1); border: none; color: white; font-size: 28px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; z-index: 1010; transition: 0.2s; }
        .close-btn:hover { background: #ff2a5f; transform: rotate(90deg); }

        /* PROFILE HEADER */
        .cover-photo-wrapper { width: 100%; height: 200px; position: relative; }
        .cover-photo { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .profile-header-info { text-align: center; padding: 0 20px 25px; border-bottom: 1px solid #222227; position: relative; }
        .avatar-wrapper { width: 130px; height: 130px; margin: -65px auto 0; position: relative; z-index: 2; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #0f0f12; object-fit: cover; }
        
        .modal-name { font-size: 24px; font-weight: 800; margin-top: 12px; color: #fff; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .verified { color: #1da1f2; font-size: 16px; }
        .bio { color: #a1a1aa; font-size: 14px; margin: 8px 0 14px; padding: 0 15px; }
        
        .action-btns { display: flex; justify-content: center; gap: 12px; margin-top: 15px; padding: 0 15px; }
        .btn { padding: 12px 24px; border: none; border-radius: 25px; font-weight: 700; cursor: pointer; font-size: 14px; transition: all 0.2s; text-decoration: none; text-align: center; width: 100%; }
        .btn-primary { background: #ff2a5f; color: white; box-shadow: 0 0 15px rgba(255, 42, 95, 0.5); animation: pulse-btn 2s infinite; }
        .btn-secondary { background: #222227; color: white; border: 1px solid #33333f; }
        .btn-primary:hover { background: #e01b4c; }

        /* FEED AREA */
        .feed { padding: 20px 15px; }
        
        /* THE "BLURRED" LIVE POST TRICK */
        .live-post { background: #131316; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ff2a5f; box-shadow: 0 0 20px rgba(255, 42, 95, 0.2); position: relative; }
        .post-header { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #222227; }
        .post-header img { width: 42px; height: 42px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        .post-author { font-weight: 700; font-size: 15px; color: #fff; }
        .post-time { font-size: 11px; color: #71717a; display: block; margin-top: 2px; }
        .viewer-count { background: rgba(255,0,0,0.1); color: #ff2a5f; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: auto; border: 1px solid #ff2a5f; }
        
        .post-text { padding: 14px 15px; font-size: 14px; line-height: 1.5; color: #e4e4e7; font-weight: 500; }
        .post-text span { color: #ff2a5f; font-weight: bold; }
        
        .video-player { position: relative; width: 100%; height: 350px; background: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; overflow: hidden; }
        .video-player img { width: 100%; height: 100%; object-fit: cover; filter: blur(12px) brightness(0.6); transform: scale(1.1); transition: 0.3s; }
        .play-btn { position: absolute; font-size: 32px; color: #fff; background: rgba(255, 42, 95, 0.9); width: 75px; height: 75px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 2; box-shadow: 0 0 30px #ff2a5f; animation: pulse 1.5s infinite; }
        .join-live-text { position: absolute; bottom: 20px; background: #ff2a5f; padding: 10px 25px; border-radius: 25px; font-weight: 800; font-size: 15px; z-index: 2; color: #fff; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nsfw-warning { position: absolute; top: 15px; background: rgba(0,0,0,0.8); color: #ffca28; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; border: 1px solid #ffca28; z-index: 2; }

        /* FAKE NOTIFICATION TOAST TRICK */
        #fakeNotification { position: fixed; bottom: -100px; left: 20px; background: #131316; border-left: 4px solid #ff2a5f; padding: 15px; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 12px; z-index: 9999; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; text-decoration: none; border-top: 1px solid #333; border-right: 1px solid #333; border-bottom: 1px solid #333; }
        #fakeNotification img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .notif-text h4 { color: #fff; font-size: 14px; margin-bottom: 3px; }
        .notif-text p { color: #a1a1aa; font-size: 12px; font-weight: bold; }
        .notif-dot { width: 8px; height: 8px; background: #ff2a5f; border-radius: 50%; margin-left: 10px; animation: blink 1s infinite; }

        /* REGULAR POSTS */
        .post { background: #131316; border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid #222227; }
        .post-image-link { display: block; width: 100%; max-height: 400px; overflow: hidden; }
        .post-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .post-actions { display: flex; justify-content: space-between; padding: 15px 20px; border-top: 1px solid #222227; }
        .action-icon { color: #a1a1aa; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; font-weight: 600; }
        .action-icon:hover { color: #ff2a5f; }

        /* ANIMATIONS */
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); } }
        @keyframes pulse-btn { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card-img-wrapper { height: 190px; }
            #fakeNotification { left: 10px; right: 10px; bottom: -120px; }
        }
    </style>
</head>

        // Use the same images provided previously

        const locations = ["København, DK", "Aarhus, DK", "Odense, DK", "Aalborg, DK", "Esbjerg, DK", "Randers, DK", "Kolding, DK"];

        const captions = [

        const profilesDatabase = [];
        const itemsPerProfile = 3;

        for (let i = 0; i < totalProfilesCount; i++) {
            let age = Math.floor(Math.random() * 6) + 19; // 19-24
            let nameRandom = names[i % names.length] + ", " + age;
            let locationRandom = locations[i % locations.length];
            let distance = (Math.random() * 8 + 1).toFixed(1); // Fake distance
            
            profilesDatabase.push({
                id: i,
                name: nameRandom,
                location: locationRandom,
                distance: distance,
                avatar: allImages[i * itemsPerProfile],      
                cover: allImages[i * itemsPerProfile + 1],  
                postImage: allImages[i * itemsPerProfile + 2],

            });
        }

        const grid = document.getElementById('profileGrid');
        profilesDatabase.forEach((profile) => {
            grid.innerHTML += `

                    <div class="card-info">
                        <div class="card-name">${profile.name}</div>
                        <div class="card-location">${profile.location}</div>
                    </div>
                </div>
            `;
        });

        function openProfile(id) {
            const profile = profilesDatabase.find(p => p.id === id);
            if(!profile) return;

            document.getElementById('profileModal').style.display = 'block';
            document.getElementById('modalAvatar').src = profile.avatar;
            document.getElementById('modalCover').src = profile.cover;
            document.getElementById('modalName').innerText = profile.name;
            document.getElementById('modalLocation').innerText = profile.location;
            document.body.style.overflow = 'hidden'; 

            generateModelFeed(profile);
            
            // Notification Trick Trigger
            setTimeout(() => {
                const notif = document.getElementById('fakeNotification');
                document.getElementById('notifImg').src = profile.avatar;
                document.getElementById('notifName').innerText = profile.name.split(',')[0];
                notif.style.bottom = "20px";
            }, 3000);
        }

        function closeModal() {
            document.getElementById('profileModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('fakeNotification').style.bottom = "-100px";
        }

        function generateModelFeed(profile) {
            const feed = document.getElementById('feedContainer');
            let viewers = Math.floor(Math.random() * 400) + 150; // Fake viewers
            feed.innerHTML = ''; 

            // LIVE POST TRICK - BLURRED VIDEO
            feed.innerHTML += `
                <div class="live-post">
                    <div class="post-header">
                        <img src="${profile.avatar}" alt="author">
                        <div>
                            <span class="post-author">${profile.name}</span>
                            <span class="post-time">Lige nu</span>

                        <div class="join-live-text">LÅS OP FOR VIDEO</div>
                    </a>
                    <div class="post-actions">
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">❤️ 1.2K Synes godt om</a>
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">💬 340 Chat</a>
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">🎁 Send Gave</a>
                    </div>
                </div>
            `;

            // REGULAR POST
            let likesCount = Math.floor(Math.random() * 500) + 250;
            let commentsCount = Math.floor(Math.random() * 80) + 15;

            feed.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <img src="${profile.avatar}" alt="author">
                        <div>
                            <span class="post-author">${profile.name}</span>
                            <span class="post-time">3 timer siden</span>
                        </div>
                    </div>
                    <div class="post-text">${profile.caption}</div>
                    <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="post-image-link">
                        <img src="${profile.postImage}" class="post-image" alt="Post Img">
                    </a>
                    <div class="post-actions">
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">❤️ Synes godt om (${likesCount})</a>
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">💬 Kommenter (${commentsCount})</a>
                        <a href="${cpaLink}" target="_blank" rel="noopener noreferrer" class="action-icon">✉️ Besked</a>
                    </div>

            `;
